<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <!-- cork -->
  <rect x="12.5" y="2.5" width="7" height="5" rx="1.5" fill="#a06a38" stroke="#5e3a18" stroke-width="1"/>
  <ellipse cx="16" cy="3.3" rx="3.3" ry="1.1" fill="#c89060"/>
  <!-- neck -->
  <path d="M13 7 L13.2 12 Q13.3 13 14.3 13 L17.7 13 Q18.7 13 18.8 12 L19 7 Z" fill="#d2e8ee" stroke="#33403a" stroke-width="1"/>
  <!-- glass body -->
  <circle cx="16" cy="20" r="10" fill="#e2f0f4" stroke="#33403a" stroke-width="1.2"/>
  <!-- liquid clipped to body -->
  <clipPath id="pclip-blind">
    <circle cx="16" cy="20" r="9.1"/>
  </clipPath>
  <g clip-path="url(#pclip-blind)">
    <rect x="5" y="14.5" width="22" height="22" fill="#3a1262"/>
    <ellipse cx="16" cy="14.5" rx="11" ry="2" fill="#6a2c9c"/>
    <!-- bubbles / overlay -->
    <circle cx="12.5" cy="22.5" r="1.5" fill="#a86ad8" opacity="0.7"/>
    <circle cx="19" cy="24" r="1.1" fill="#a86ad8" opacity="0.6"/>
    <circle cx="16.5" cy="20" r="0.9" fill="#c89aec" opacity="0.6"/>
    <path d="M10 18 Q16 16 22 18" stroke="#1a0533" stroke-width="1.4" fill="none" opacity="0.5"/>
  </g>
  <!-- glass shine -->
  <path d="M10 14.5 Q7.5 19 9.5 24.5" stroke="#ffffff" stroke-width="2" opacity="0.5" fill="none" stroke-linecap="round"/>
  <circle cx="12.5" cy="15.5" r="1.2" fill="#ffffff" opacity="0.55"/>
</svg>
