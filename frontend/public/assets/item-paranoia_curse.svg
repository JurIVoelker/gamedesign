  <path d="M27.5 16 Q24 17.4 21 16.4" stroke="#c83838" stroke-width="0.8" fill="none" opacity="0.8"/>
  <path d="M6 13.5 Q9 14.6 11.5 14.2" stroke="#c83838" stroke-width="0.6" fill="none" opacity="0.7"/>
  <!-- iris -->
  <circle cx="17" cy="16" r="6.6" fill="#3a8a6a" stroke="#1f4a38" stroke-width="1"/>
